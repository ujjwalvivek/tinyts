<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Match-3 swap sliding blocks puzzle."
        />
        <title>TinyTS - Match-3 Cascade</title>
        <style>
            @font-face {
                font-family: "TinyTS";
                src: url("../../src/font/tinyTS.woff2")
                    format("woff2");
                font-weight: 100 900;
                font-style: normal;
                font-display: block;
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                background: #1e1e2e;
                color: #cdd6f4;
                font-family: "TinyTS", monospace;
                overflow: hidden;
                display: flex;
                align-items: center;
                justify-content: center;
                width: 100vw;
                height: 100vh;
            }
            #canvas-container {
                width: 100%;
                height: 100%;
                position: relative;
                background: #11111b;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            #canvas-container canvas {
                position: absolute !important;
                left: 50% !important;
                top: 50% !important;
                transform: translate(-50%, -50%) !important;
                max-width: 95% !important;
                max-height: 95% !important;
                width: auto !important;
                height: auto !important;
                aspect-ratio: 16/9 !important;
                border: 2px dashed #cba6f7;
            }
            html {
                -webkit-text-size-adjust: 100%;
                text-size-adjust: 100%;
            }
        </style>
    </head>
    <body>
        <div id="canvas-container"></div>
        <script src="../../dist/tinyts.js"></script>
        <script>
            const W = 640,
                H = 360;
            const GRID_COLS = 8;
            const GRID_ROWS = 8;
            const GEM_SIZE = 28;
            const GEM_PADDING = 3;
            const BOARD_SIZE =
                GRID_COLS * GEM_SIZE + (GRID_COLS + 1) * GEM_PADDING;
            const BOARD_X = (W - BOARD_SIZE) / 2 + 100;
            const BOARD_Y = (H - BOARD_SIZE) / 2 + 12;

            const grid = Array(GRID_COLS * GRID_ROWS).fill(0);
            const gemColors = [
                "",
                "#f38ba8",
                "#89b4fa",
                "#a6e3a1",
                "#f9e2af",
                "#cba6f7",
            ];

            let selectedGem = null;
            let score = 0;
            let movesLeft = 20;
            let gameState = "playing";
            let slideTimer = 0;
            let visualGems = [];
            let nextGemId = 0;

            function getScreenPos(gx, gy) {
                const x = BOARD_X + GEM_PADDING + gx * (GEM_SIZE + GEM_PADDING);
                const y = BOARD_Y + GEM_PADDING + gy * (GEM_SIZE + GEM_PADDING);
                return vec2(x, y);
            }

            function fillBoard() {
                visualGems.length = 0;
                for (let y = 0; y < GRID_ROWS; y++) {
                    for (let x = 0; x < GRID_COLS; x++) {
                        let type;
                        do {
                            type = randInt(1, 5);
                        } while (
                            (x >= 2 &&
                                grid[y * GRID_COLS + x - 1] === type &&
                                grid[y * GRID_COLS + x - 2] === type) ||
                            (y >= 2 &&
                                grid[(y - 1) * GRID_COLS + x] === type &&
                                grid[(y - 2) * GRID_COLS + x] === type)
                        );

                        const idx = y * GRID_COLS + x;
                        grid[idx] = type;

                        const sPos = getScreenPos(x, y);
                        visualGems.push({
                            id: nextGemId++,
                            type: type,
                            gridX: x,
                            gridY: y,
                            pos: sPos.clone(),
                            scale: 1.0,
                        });
                    }
                }
                score = 0;
                movesLeft = 20;
                gameState = "playing";
            }

            function findVisualGem(x, y) {
                return visualGems.find((g) => g.gridX === x && g.gridY === y);
            }

            function handleGemClick(gx, gy) {
                if (gameState !== "playing" || movesLeft <= 0) return;

                if (!selectedGem) {
                    selectedGem = { x: gx, y: gy };
                    playSound(sfx.blip({ volume: 0.12, pitch: 1.2 }));
                } else {
                    const dx = Math.abs(selectedGem.x - gx);
                    const dy = Math.abs(selectedGem.y - gy);

                    if ((dx === 1 && dy === 0) || (dx === 0 && dy === 1)) {
                        swapGems(selectedGem.x, selectedGem.y, gx, gy);
                        selectedGem = null;
                    } else {
                        selectedGem = { x: gx, y: gy };
                        playSound(sfx.blip({ volume: 0.12, pitch: 1.3 }));
                    }
                }
            }

            function swapGems(x1, y1, x2, y2, revertOnFail = true) {
                gameState = "falling";

                const idx1 = y1 * GRID_COLS + x1;
                const idx2 = y2 * GRID_COLS + x2;

                const temp = grid[idx1];
                grid[idx1] = grid[idx2];
                grid[idx2] = temp;

                const g1 = findVisualGem(x1, y1);
                const g2 = findVisualGem(x2, y2);

                if (g1) {
                    g1.gridX = x2;
                    g1.gridY = y2;
                }
                if (g2) {
                    g2.gridX = x1;
                    g2.gridY = y1;
                }

                playSound(sfx.dash({ volume: 0.15, pitch: 1.1 }));

                setTimeout(() => {
                    const matches = scanMatches();
                    if (matches.length > 0) {
                        if (revertOnFail) {
                            movesLeft--;
                        }
                        clearMatches(matches);
                    } else if (revertOnFail) {
                        playSound(sfx.menuCancel({ volume: 0.12 }));
                        grid[idx1] = grid[idx2];
                        grid[idx2] = temp;
                        if (g1) {
                            g1.gridX = x1;
                            g1.gridY = y1;
                        }
                        if (g2) {
                            g2.gridX = x2;
                            g2.gridY = y2;
                        }
                        setTimeout(() => {
                            gameState = "playing";
                        }, 200);
                    } else {
                        gameState = "playing";
                    }
                }, 220);
            }

            function scanMatches() {
                const matchSet = new Set();

                for (let y = 0; y < GRID_ROWS; y++) {
                    for (let x = 0; x < GRID_COLS - 2; x++) {
                        const idx = y * GRID_COLS + x;
                        const type = grid[idx];
                        if (
                            type !== 0 &&
                            grid[idx + 1] === type &&
                            grid[idx + 2] === type
                        ) {
                            matchSet.add(idx);
                            matchSet.add(idx + 1);
                            matchSet.add(idx + 2);

                            let offset = 3;
                            while (
                                x + offset < GRID_COLS &&
                                grid[idx + offset] === type
                            ) {
                                matchSet.add(idx + offset);
                                offset++;
                            }
                        }
                    }
                }

                for (let x = 0; x < GRID_COLS; x++) {
                    for (let y = 0; y < GRID_ROWS - 2; y++) {
                        const idx = y * GRID_COLS + x;
                        const type = grid[idx];
                        if (
                            type !== 0 &&
                            grid[(y + 1) * GRID_COLS + x] === type &&
                            grid[(y + 2) * GRID_COLS + x] === type
                        ) {
                            matchSet.add(idx);
                            matchSet.add(idx + GRID_COLS);
                            matchSet.add(idx + 2 * GRID_COLS);

                            let offset = 3;
                            while (
                                y + offset < GRID_ROWS &&
                                grid[(y + offset) * GRID_COLS + x] === type
                            ) {
                                matchSet.add(idx + offset * GRID_COLS);
                                offset++;
                            }
                        }
                    }
                }

                return Array.from(matchSet);
            }

            function clearMatches(matches) {
                playSound(sfx.explosion({ volume: 0.16, pitch: 1.4 }));

                for (const idx of matches) {
                    const gx = idx % GRID_COLS;
                    const gy = Math.floor(idx / GRID_COLS);

                    const gPos = getScreenPos(gx, gy).add(
                        vec2(GEM_SIZE / 2, GEM_SIZE / 2),
                    );
                    emitParticles({
                        pos: gPos,
                        count: 6,
                        life: [0.2, 0.45],
                        speed: [30, 90],
                        color: [gemColors[grid[idx]], "#fff"],
                    });

                    grid[idx] = 0;

                    const vt = findVisualGem(gx, gy);
                    if (vt) {
                        const gIdx = visualGems.indexOf(vt);
                        if (gIdx !== -1) visualGems.splice(gIdx, 1);
                    }

                    score += 15;
                }

                setTimeout(applyGravity, 250);
            }

            function applyGravity() {
                let fell = false;

                for (const x of Array(GRID_COLS).keys()) {
                    let emptySlots = 0;
                    for (let y = GRID_ROWS - 1; y >= 0; y--) {
                        const idx = y * GRID_COLS + x;
                        if (grid[idx] === 0) {
                            emptySlots++;
                        } else if (emptySlots > 0) {
                            // Fall down
                            const targetY = y + emptySlots;
                            grid[targetY * GRID_COLS + x] = grid[idx];
                            grid[idx] = 0;

                            const vt = findVisualGem(x, y);
                            if (vt) {
                                vt.gridY = targetY;
                            }
                            fell = true;
                        }
                    }

                    for (let i = 0; i < emptySlots; i++) {
                        const targetY = emptySlots - 1 - i;
                        const type = randInt(1, 5);
                        grid[targetY * GRID_COLS + x] = type;

                        const spawnPos = getScreenPos(x, -1 - i);
                        visualGems.push({
                            id: nextGemId++,
                            type: type,
                            gridX: x,
                            gridY: targetY,
                            pos: spawnPos,
                            scale: 1.0,
                        });
                        fell = true;
                    }
                }

                if (fell) {
                    playSound(sfx.blip({ volume: 0.08, pitch: 0.85 }));

                    setTimeout(() => {
                        const matches = scanMatches();
                        if (matches.length > 0) {
                            clearMatches(matches);
                        } else {
                            gameState = "playing";
                            if (movesLeft <= 0) {
                                gameState = "gameover";
                                playSound(sfx.death());
                            }
                        }
                    }, 250);
                } else {
                    gameState = "playing";
                }
            }

            fillBoard();

            const engine = engineStart({
                size: { width: W, height: H },
                pixelated: true,

                update(dt) {
                    updateParticles(dt);

                    if (gameState === "gameover") {
                        if (mousePressed(0) || keyPressed("Space")) {
                            fillBoard();
                        }
                        return;
                    }

                    for (const vg of visualGems) {
                        const targetPos = getScreenPos(vg.gridX, vg.gridY);
                        vg.pos.lerp(targetPos, 14 * dt);
                    }

                    if (mousePressed(0) && gameState === "playing") {
                        const mp = mousePos();
                        const mx = mp.x;
                        const my = mp.y;

                        if (
                            mx >= BOARD_X &&
                            mx <= BOARD_X + BOARD_SIZE &&
                            my >= BOARD_Y &&
                            my <= BOARD_Y + BOARD_SIZE
                        ) {
                            const gx = Math.floor(
                                (mx - BOARD_X - GEM_PADDING) /
                                    (GEM_SIZE + GEM_PADDING),
                            );
                            const gy = Math.floor(
                                (my - BOARD_Y - GEM_PADDING) /
                                    (GEM_SIZE + GEM_PADDING),
                            );

                            if (
                                gx >= 0 &&
                                gx < GRID_COLS &&
                                gy >= 0 &&
                                gy < GRID_ROWS
                            ) {
                                handleGemClick(gx, gy);
                            }
                        }
                    }
                },

                render() {
                    clear("#11111b");

                    for (let x = 0; x < W; x += 40) {
                        drawLine(
                            vec2(x, 0),
                            vec2(x, H),
                            "rgba(49, 50, 68, 0.08)",
                        );
                    }

                    const hudX = 40;
                    drawText("GEMS CASCADE // MATCH-3", vec2(hudX, 75), {
                        font: "bold 9.1px 'TinyTS'",
                        color: "#cba6f7",
                    });
                    drawText(
                        "SWAP GEMS TO SCORE & CLEAR CHANNELS",
                        vec2(hudX, 96),
                        { font: "5.25px 'TinyTS'", color: "#a6adc8" },
                    );

                    drawRect(vec2(hudX, 130), vec2(90, 46), "#181825");
                    drawRectOutline(
                        vec2(hudX, 130),
                        vec2(90, 46),
                        "#313244",
                        1,
                    );
                    drawText("SCORE", vec2(hudX + 10, 144), {
                        font: "4.9px 'TinyTS'",
                        color: "#585b70",
                    });
                    drawText(`${score}`, vec2(hudX + 10, 162), {
                        font: "bold 8.4px 'TinyTS'",
                        color: "#fab387",
                    });

                    drawRect(vec2(hudX + 105, 130), vec2(90, 46), "#181825");
                    drawRectOutline(
                        vec2(hudX + 105, 130),
                        vec2(90, 46),
                        "#313244",
                        1,
                    );
                    drawText("MOVES LEFT", vec2(hudX + 115, 144), {
                        font: "4.9px 'TinyTS'",
                        color: "#585b70",
                    });
                    drawText(`${movesLeft}`, vec2(hudX + 115, 162), {
                        font: "bold 8.4px 'TinyTS'",
                        color: "#f9e2af",
                    });

                    drawText("CONTROLS:", vec2(hudX, 220), {
                        font: "bold 6.3px 'TinyTS'",
                        color: "#89b4fa",
                    });
                    drawText(
                        "• CLICK A GEM AND A NEIGHBOR TO SWAP THEM",
                        vec2(hudX, 240),
                        { font: "5.6px 'TinyTS'", color: "#a6adc8" },
                    );
                    drawText(
                        "• FORM ROWS OF 3+ EQUAL GEMS TO MATCH",
                        vec2(hudX, 255),
                        { font: "5.6px 'TinyTS'", color: "#a6adc8" },
                    );
                    drawText(
                        "• MATCHING GEMS EXPLODE AND CASCADE NEW GEMS",
                        vec2(hudX, 270),
                        { font: "5.6px 'TinyTS'", color: "#a6adc8" },
                    );

                    drawRect(
                        vec2(BOARD_X, BOARD_Y),
                        vec2(BOARD_SIZE, BOARD_SIZE),
                        "#181825",
                    );
                    drawRectOutline(
                        vec2(BOARD_X, BOARD_Y),
                        vec2(BOARD_SIZE, BOARD_SIZE),
                        "#313244",
                        2,
                    );

                    for (let gy = 0; gy < GRID_ROWS; gy++) {
                        for (let gx = 0; gx < GRID_COLS; gx++) {
                            const cellPos = getScreenPos(gx, gy);
                            drawRect(
                                cellPos,
                                vec2(GEM_SIZE, GEM_SIZE),
                                "#11111b",
                            );
                        }
                    }

                    for (const vg of visualGems) {
                        const color = gemColors[vg.type];
                        const gp = vg.pos;

                        if (vg.type === 1) {
                            drawCircle(
                                gp
                                    .clone()
                                    .add(vec2(GEM_SIZE / 2, GEM_SIZE / 2)),
                                GEM_SIZE / 2 - 1,
                                color,
                            );
                        } else if (vg.type === 2) {
                            drawRect(
                                gp.clone().add(vec2(3, 3)),
                                vec2(GEM_SIZE - 6, GEM_SIZE - 6),
                                color,
                            );
                        } else if (vg.type === 3) {
                            drawCircle(
                                gp
                                    .clone()
                                    .add(vec2(GEM_SIZE / 2, GEM_SIZE / 2)),
                                GEM_SIZE / 3,
                                color,
                            );
                            drawRectOutline(
                                gp.clone().add(vec2(2, 2)),
                                vec2(GEM_SIZE - 4, GEM_SIZE - 4),
                                "#fff",
                                1,
                            );
                        } else if (vg.type === 4) {
                            drawCircle(
                                gp
                                    .clone()
                                    .add(vec2(GEM_SIZE / 2, GEM_SIZE / 2)),
                                GEM_SIZE / 2 - 2,
                                color,
                            );
                            drawCircle(
                                gp
                                    .clone()
                                    .add(vec2(GEM_SIZE / 2, GEM_SIZE / 2)),
                                GEM_SIZE / 4,
                                "#fff",
                            );
                        } else if (vg.type === 5) {
                            drawCircleOutline(
                                gp
                                    .clone()
                                    .add(vec2(GEM_SIZE / 2, GEM_SIZE / 2)),
                                GEM_SIZE / 2 - 2,
                                color,
                                2.5,
                            );
                        }

                        drawCircle(
                            gp.clone().add(vec2(7, 7)),
                            1.5,
                            "rgba(255,255,255,0.45)",
                        );
                    }

                    if (selectedGem && gameState === "playing") {
                        const sPos = getScreenPos(selectedGem.x, selectedGem.y);
                        drawRectOutline(
                            sPos,
                            vec2(GEM_SIZE, GEM_SIZE),
                            "#fff",
                            2,
                        );
                    }

                    renderParticles();

                    drawRect(vec2(0, 0), vec2(W, 30), "rgba(24, 24, 37, 0.95)");
                    drawLine(vec2(0, 30), vec2(W, 30), "#313244", 1);
                    drawText(
                        "GEMS CASCADE CORES // GRID SYSTEM STATUS",
                        vec2(W / 2, 10),
                        {
                            font: "bold 6.65px 'TinyTS'",
                            color: "#cba6f7",
                            align: "center",
                        },
                    );

                    if (gameState === "gameover") {
                        drawRect(
                            vec2(0, 0),
                            vec2(W, H),
                            "rgba(17, 17, 27, 0.85)",
                        );
                        drawText(
                            "MOVES DEPLETED // ENGINE STOPPED",
                            vec2(W / 2, H / 2 - 12),
                            {
                                font: "bold 9.8px 'TinyTS'",
                                color: "#f38ba8",
                                align: "center",
                            },
                        );
                        drawText(
                            `FINAL SCORE COMPILATION: ${score}`,
                            vec2(W / 2, H / 2 + 10),
                            {
                                font: "7px 'TinyTS'",
                                color: "#fab387",
                                align: "center",
                            },
                        );
                        drawText(
                            "TAP ANYWHERE OR SPACE TO GENERATE NEW GRID",
                            vec2(W / 2, H / 2 + 35),
                            {
                                font: "5.95px 'TinyTS'",
                                color: "#a6adc8",
                                align: "center",
                            },
                        );
                    }
                },
            });

            document
                .getElementById("canvas-container")
                .appendChild(engine.canvasManager.canvas);
            if (engine.overlayCanvas) {
                document
                    .getElementById("canvas-container")
                    .appendChild(engine.overlayCanvas);
            }
            setTouchMappedToMouse(true);
        </script>
    </body>
</html>
