<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Sliding tile merge puzzle game." />
        <title>TinyTS - 2048 Puzzle</title>
        <style>
            @font-face {
                font-family: "TinyTS";
                src: url("../../src/font/tinyTS.woff2")
                    format("woff2");
                font-weight: 100 900;
                font-style: normal;
                font-display: block;
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                background: #1e1e2e;
                color: #cdd6f4;
                font-family: "TinyTS", monospace;
                overflow: hidden;
                display: flex;
                align-items: center;
                justify-content: center;
                width: 100vw;
                height: 100vh;
            }
            #canvas-container {
                width: 100%;
                height: 100%;
                position: relative;
                background: #11111b;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            #canvas-container canvas {
                position: absolute !important;
                left: 50% !important;
                top: 50% !important;
                transform: translate(-50%, -50%) !important;
                max-width: 95% !important;
                max-height: 95% !important;
                width: auto !important;
                height: auto !important;
                aspect-ratio: 16/9 !important;
                border: 2px dashed #cba6f7;
            }
            html {
                -webkit-text-size-adjust: 100%;
                text-size-adjust: 100%;
            }
        </style>
    </head>
    <body>
        <div id="canvas-container"></div>
        <script src="../../dist/tinyts.js"></script>
        <script>
            const W = 640,
                H = 360;
            const GRID_SIZE = 4;
            const TILE_WIDTH = 54;
            const TILE_PADDING = 8;
            const BOARD_SIZE =
                GRID_SIZE * TILE_WIDTH + (GRID_SIZE + 1) * TILE_PADDING;
            const BOARD_X = W - BOARD_SIZE - 40;
            const BOARD_Y = (H - BOARD_SIZE) / 2 + 10;

            const grid = Array(GRID_SIZE * GRID_SIZE).fill(0);
            const visualTiles = [];
            let nextTileId = 0;
            let score = 0;
            let highScore = parseInt(
                localStorage.getItem("2048_high") || "0",
                10,
            );
            let gameState = "playing";

            bindAction("up", ["ArrowUp", "KeyW"]);
            bindAction("down", ["ArrowDown", "KeyS"]);
            bindAction("left", ["ArrowLeft", "KeyA"]);
            bindAction("right", ["ArrowRight", "KeyD"]);

            const tileColors = {
                2: { bg: "#313244", fg: "#cdd6f4" },
                4: { bg: "#45475a", fg: "#cdd6f4" },
                8: { bg: "#f38ba8", fg: "#11111b" },
                16: { bg: "#fab387", fg: "#11111b" },
                32: { bg: "#f9e2af", fg: "#11111b" },
                64: { bg: "#a6e3a1", fg: "#11111b" },
                128: { bg: "#94e2d5", fg: "#11111b" },
                256: { bg: "#89dceb", fg: "#11111b" },
                512: { bg: "#74c7ec", fg: "#11111b" },
                1024: { bg: "#89b4fa", fg: "#11111b" },
                2048: { bg: "#cba6f7", fg: "#11111b" },
                4096: { bg: "#b4befe", fg: "#11111b" },
            };

            function getScreenPos(gx, gy) {
                const x =
                    BOARD_X + TILE_PADDING + gx * (TILE_WIDTH + TILE_PADDING);
                const y =
                    BOARD_Y + TILE_PADDING + gy * (TILE_WIDTH + TILE_PADDING);
                return vec2(x, y);
            }

            function spawnTile() {
                const emptyIndices = [];
                for (let i = 0; i < grid.length; i++) {
                    if (grid[i] === 0) emptyIndices.push(i);
                }
                if (emptyIndices.length === 0) return;

                const idx = choose(emptyIndices);
                const val = Math.random() < 0.9 ? 2 : 4;
                grid[idx] = val;

                const gx = idx % GRID_SIZE;
                const gy = Math.floor(idx / GRID_SIZE);
                const sPos = getScreenPos(gx, gy);

                visualTiles.push({
                    id: nextTileId++,
                    val: val,
                    gridX: gx,
                    gridY: gy,
                    pos: sPos.clone(),
                    scale: 0.1,
                });
                playSound(sfx.blip({ volume: 0.12, pitch: 1.4 }));
            }

            function initGame() {
                grid.fill(0);
                visualTiles.length = 0;
                score = 0;
                gameState = "playing";
                spawnTile();
                spawnTile();
            }

            function slide(dirX, dirY) {
                if (gameState !== "playing") return;

                let moved = false;
                const oldGrid = [...grid];

                for (let i = 0; i < GRID_SIZE; i++) {
                    const originalCells = [];

                    for (let k = 0; k < GRID_SIZE; k++) {
                        let gx, gy;
                        if (dirX !== 0) {
                            gy = i;
                            gx = dirX < 0 ? k : GRID_SIZE - 1 - k;
                        } else {
                            gx = i;
                            gy = dirY < 0 ? k : GRID_SIZE - 1 - k;
                        }

                        const val = grid[gy * GRID_SIZE + gx];
                        const vt = visualTiles.find(
                            (t) =>
                                t.gridX === gx &&
                                t.gridY === gy &&
                                !t.killOnArrive,
                        );
                        originalCells.push({ gx, gy, val, vt });
                    }

                    const nonEmpties = originalCells.filter((c) => c.val > 0);
                    const newCells = [];
                    let idx = 0;
                    while (idx < nonEmpties.length) {
                        if (
                            idx + 1 < nonEmpties.length &&
                            nonEmpties[idx].val === nonEmpties[idx + 1].val
                        ) {
                            newCells.push({
                                val: nonEmpties[idx].val * 2,
                                vt: nonEmpties[idx].vt,
                                mergedFrom: [
                                    nonEmpties[idx],
                                    nonEmpties[idx + 1],
                                ],
                            });
                            idx += 2;
                        } else {
                            newCells.push({
                                val: nonEmpties[idx].val,
                                vt: nonEmpties[idx].vt,
                                mergedFrom: null,
                            });
                            idx += 1;
                        }
                    }
                    while (newCells.length < GRID_SIZE) {
                        newCells.push({ val: 0, vt: null, mergedFrom: null });
                    }

                    for (let k = 0; k < GRID_SIZE; k++) {
                        const orig = originalCells[k];
                        const nc = newCells[k];

                        grid[orig.gy * GRID_SIZE + orig.gx] = nc.val;

                        if (nc.val > 0) {
                            if (nc.mergedFrom) {
                                const c1 = nc.mergedFrom[0];
                                const c2 = nc.mergedFrom[1];

                                if (c1.vt) {
                                    c1.vt.gridX = orig.gx;
                                    c1.vt.gridY = orig.gy;
                                    c1.vt.val = nc.val;
                                    c1.vt.pulse = 1.35;
                                }
                                if (c2.vt) {
                                    c2.vt.gridX = orig.gx;
                                    c2.vt.gridY = orig.gy;
                                    c2.vt.killOnArrive = true;
                                }

                                score += nc.val;
                                if (score > highScore) {
                                    highScore = score;
                                    localStorage.setItem(
                                        "2048_high",
                                        highScore,
                                    );
                                }

                                const tPos = getScreenPos(orig.gx, orig.gy).add(
                                    vec2(TILE_WIDTH / 2, TILE_WIDTH / 2),
                                );
                                emitParticles({
                                    pos: tPos,
                                    count: 5,
                                    life: [0.15, 0.3],
                                    speed: [30, 80],
                                    color: [
                                        tileColors[nc.val]?.bg || "#fff",
                                        "#fff",
                                    ],
                                });
                            } else {
                                if (nc.vt) {
                                    nc.vt.gridX = orig.gx;
                                    nc.vt.gridY = orig.gy;
                                }
                            }
                        }
                    }
                }

                for (let i = 0; i < grid.length; i++) {
                    if (grid[i] !== oldGrid[i]) {
                        moved = true;
                        break;
                    }
                }

                if (moved) {
                    spawnTile();
                    playSound(sfx.dash({ volume: 0.16, pitch: 0.95 }));
                    checkGameOver();
                } else {
                    playSound(sfx.menuCancel({ volume: 0.08 }));
                }
            }

            function checkGameOver() {
                for (let i = 0; i < grid.length; i++) {
                    if (grid[i] === 0) return;
                }

                for (let x = 0; x < GRID_SIZE; x++) {
                    for (let y = 0; y < GRID_SIZE - 1; y++) {
                        if (
                            grid[y * GRID_SIZE + x] ===
                            grid[(y + 1) * GRID_SIZE + x]
                        )
                            return;
                    }
                }

                for (let y = 0; y < GRID_SIZE; y++) {
                    for (let x = 0; x < GRID_SIZE - 1; x++) {
                        if (
                            grid[y * GRID_SIZE + x] ===
                            grid[y * GRID_SIZE + x + 1]
                        )
                            return;
                    }
                }

                gameState = "gameover";
                playSound(sfx.death());
            }

            initGame();

            const engine = engineStart({
                size: { width: W, height: H },
                pixelated: true,

                update(dt) {
                    updateParticles(dt);

                    if (gameState === "gameover" || gameState === "victory") {
                        if (mousePressed(0) || keyPressed("Space")) {
                            initGame();
                        }
                        return;
                    }

                    if (actionPressed("left")) slide(-1, 0);
                    else if (actionPressed("right")) slide(1, 0);
                    else if (actionPressed("up")) slide(0, -1);
                    else if (actionPressed("down")) slide(0, 1);

                    for (let i = visualTiles.length - 1; i >= 0; i--) {
                        const vt = visualTiles[i];
                        const targetPos = getScreenPos(vt.gridX, vt.gridY);

                        vt.pos.lerp(targetPos, 16 * dt);

                        if (vt.scale < 1.0) {
                            vt.scale = lerp(vt.scale, 1.0, 14 * dt);
                        }
                        if (vt.pulse > 1.0) {
                            vt.pulse = lerp(vt.pulse, 1.0, 10 * dt);
                        }

                        if (
                            vt.killOnArrive &&
                            vt.pos.distanceTo(targetPos) < 2
                        ) {
                            playSound(
                                sfx.coin({ volume: 0.1, frequency: 1200 }),
                            );
                            visualTiles.splice(i, 1);
                        }
                    }
                },

                render() {
                    clear("#11111b");

                    for (let x = 0; x < W; x += 40) {
                        drawLine(
                            vec2(x, 0),
                            vec2(x, H),
                            "rgba(49, 50, 68, 0.08)",
                        );
                    }

                    const leftX = 40;
                    drawText("2048 // MERGE GRID", vec2(leftX, 75), {
                        font: "bold 10.5px 'TinyTS'",
                        color: "#cba6f7",
                    });
                    drawText(
                        "SLIDE EQUAL TILES TO CONSOLIDATE POWERS",
                        vec2(leftX, 100),
                        { font: "5.25px 'TinyTS'", color: "#a6adc8" },
                    );
                    drawRect(vec2(leftX, 130), vec2(100, 46), "#181825");
                    drawRectOutline(
                        vec2(leftX, 130),
                        vec2(100, 46),
                        "#313244",
                        1,
                    );
                    drawText("SCORE", vec2(leftX + 10, 144), {
                        font: "4.9px 'TinyTS'",
                        color: "#585b70",
                    });
                    drawText(`${score}`, vec2(leftX + 10, 162), {
                        font: "bold 8.4px 'TinyTS'",
                        color: "#fab387",
                    });
                    drawRect(vec2(leftX + 115, 130), vec2(100, 46), "#181825");
                    drawRectOutline(
                        vec2(leftX + 115, 130),
                        vec2(100, 46),
                        "#313244",
                        1,
                    );
                    drawText("BEST", vec2(leftX + 125, 144), {
                        font: "4.9px 'TinyTS'",
                        color: "#585b70",
                    });
                    drawText(`${highScore}`, vec2(leftX + 125, 162), {
                        font: "bold 8.4px 'TinyTS'",
                        color: "#f9e2af",
                    });
                    drawText("CONTROLS:", vec2(leftX, 220), {
                        font: "bold 6.3px 'TinyTS'",
                        color: "#89b4fa",
                    });
                    drawText(
                        "• USE W,A,S,D OR ARROWS TO SLIDE GRID",
                        vec2(leftX, 240),
                        { font: "5.6px 'TinyTS'", color: "#a6adc8" },
                    );
                    drawText(
                        "• MATCH EQUAL POWERS TO MERGE TILES",
                        vec2(leftX, 255),
                        { font: "5.6px 'TinyTS'", color: "#a6adc8" },
                    );
                    drawText(
                        "• REACH 2048 TO UNLOCK MAINFRAME",
                        vec2(leftX, 270),
                        { font: "5.6px 'TinyTS'", color: "#a6adc8" },
                    );
                    drawRect(
                        vec2(BOARD_X, BOARD_Y),
                        vec2(BOARD_SIZE, BOARD_SIZE),
                        "#181825",
                    );
                    drawRectOutline(
                        vec2(BOARD_X, BOARD_Y),
                        vec2(BOARD_SIZE, BOARD_SIZE),
                        "#313244",
                        2,
                    );

                    for (let gy = 0; gy < GRID_SIZE; gy++) {
                        for (let gx = 0; gx < GRID_SIZE; gx++) {
                            const cellPos = getScreenPos(gx, gy);
                            drawRect(
                                cellPos,
                                vec2(TILE_WIDTH, TILE_WIDTH),
                                "#11111b",
                            );
                        }
                    }

                    for (const vt of visualTiles) {
                        if (vt.killOnArrive) continue;

                        const theme = tileColors[vt.val] || {
                            bg: "#cba6f7",
                            fg: "#11111b",
                        };
                        const curScale = vt.scale;
                        const pulseScale = vt.pulse || 1.0;
                        const finalW = TILE_WIDTH * curScale * pulseScale;
                        const offset = (TILE_WIDTH - finalW) / 2;

                        const tilePos = vt.pos
                            .clone()
                            .add(vec2(offset, offset));
                        const tileSize = vec2(finalW, finalW);

                        drawRect(tilePos, tileSize, theme.bg);
                        drawRectOutline(
                            tilePos,
                            tileSize,
                            "rgba(255,255,255,0.12)",
                            1,
                        );

                        const fontSize =
                            vt.val >= 1000
                                ? "9.5px"
                                : vt.val >= 100
                                  ? "11px"
                                  : "13px";
                        const numPos = tilePos
                            .clone()
                            .add(vec2(finalW / 2, finalW / 2));
                        drawText(`${vt.val}`, numPos, {
                            font: `bold ${fontSize} 'TinyTS'`,
                            color: theme.fg,
                            align: "center",
                            baseline: "middle",
                        });
                    }

                    renderParticles();

                    drawRect(vec2(0, 0), vec2(W, 30), "rgba(24, 24, 37, 0.95)");
                    drawLine(vec2(0, 30), vec2(W, 30), "#313244", 1);
                    drawText(
                        "PUZZLE GRID SYNAPSE // MERGING MATRIX",
                        vec2(W / 2, 10),
                        {
                            font: "bold 6.65px 'TinyTS'",
                            color: "#cba6f7",
                            align: "center",
                        },
                    );

                    if (gameState === "gameover") {
                        drawRect(
                            vec2(0, 0),
                            vec2(W, H),
                            "rgba(17, 17, 27, 0.85)",
                        );
                        drawText(
                            "SYNAPSE GRID STAGNANT // GAME OVER",
                            vec2(W / 2, H / 2 - 12),
                            {
                                font: "bold 9.8px 'TinyTS'",
                                color: "#f38ba8",
                                align: "center",
                            },
                        );
                        drawText(
                            `FINAL MERGE METRIC: ${score}`,
                            vec2(W / 2, H / 2 + 10),
                            {
                                font: "7px 'TinyTS'",
                                color: "#fab387",
                                align: "center",
                            },
                        );
                        drawText(
                            "TAP ANYWHERE OR PRESS SPACE TO DEPLOY NEW MATRIX",
                            vec2(W / 2, H / 2 + 35),
                            {
                                font: "5.95px 'TinyTS'",
                                color: "#a6adc8",
                                align: "center",
                            },
                        );
                    }
                },
            });

            document
                .getElementById("canvas-container")
                .appendChild(engine.canvasManager.canvas);
            if (engine.overlayCanvas) {
                document
                    .getElementById("canvas-container")
                    .appendChild(engine.overlayCanvas);
            }
        
            addTouchControls({
                left: 'ArrowLeft',
                right: 'ArrowRight',
                up: 'ArrowUp',
                down: 'ArrowDown',
            });
</script>
    </body>
</html>
