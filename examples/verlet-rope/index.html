<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="TinyTS verlet rope demo showing physics simulation with mouse drag interaction."
        />
        <meta name="theme-color" content="#1e1e2e" />
        <title>TinyTS - Verlet Rope</title>
        <link rel="icon" href="../public/favicon.svg" type="image/svg+xml" />
        <style>
            @font-face {
                font-family: "Monaspace Neon";
                src: url("https://cdn.ujjwalvivek.com/fonts/Monaspace/Neon/Var.woff2")
                    format("woff2");
                font-weight: 100 900;
                font-style: normal;
                font-display: block;
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                background: #1e1e2e;
                color: #cdd6f4;
                font-family: "Monaspace Neon", monospace;
                overflow: hidden;
                display: flex;
                align-items: center;
                justify-content: center;
                width: 100vw;
                height: 100vh;
            }
            #canvas-container {
                width: 100%;
                height: 100%;
                position: relative;
                background: #11111b;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            #canvas-container canvas {
                position: absolute !important;
                left: 50% !important;
                top: 50% !important;
                transform: translate(-50%, -50%) !important;
                max-width: 95% !important;
                max-height: 95% !important;
                width: auto !important;
                height: auto !important;
                aspect-ratio: 16/9 !important;
                border: 2px dashed #cba6f7;
            }
        </style>
    </head>
    <body>
        <div id="canvas-container"></div>
        <script src="../../dist/tinyts.js"></script>
        <script>
            const W = 640,
                H = 360;

            const ropeLen = 25;
            const segLen = (540 - 100) / ropeLen;
            const rope = createVerletRope(100, 50, ropeLen, segLen, true);

            rope.points[rope.points.length - 1].pinned = true;

            let dragPoint = null;

            const debris = [];
            for (let i = 0; i < 60; i++) {
                debris.push({
                    x: rand(0, W),
                    y: rand(0, H),
                    vx: rand(-20, 20),
                    vy: rand(-30, -10),
                    size: rand(2, 5),
                    color: choose(["#45475a", "#585b70", "#313244"]),
                });
            }

            const engine = engineStart({
                size: { width: W, height: H },
                pixelated: true,
                update(dt) {
                    if (mouseDown(0)) {
                        const mp = mousePos();
                        if (!dragPoint) {
                            let bestDist = 25,
                                best = null;
                            for (const p of rope.points) {
                                const d = Math.hypot(
                                    p.pos.x - mp.x,
                                    p.pos.y - mp.y,
                                );
                                if (d < bestDist) {
                                    bestDist = d;
                                    best = p;
                                }
                            }
                            if (best) {
                                dragPoint = best;
                                dragPoint.pinned = true;
                            }
                        }
                        if (dragPoint) {
                            dragPoint.pos.x = mp.x;
                            dragPoint.pos.y = mp.y;
                        }
                    } else if (dragPoint) {
                        dragPoint.pinned = false;
                        dragPoint = null;
                    }

                    updateVerletRope(rope, vec2(0, 600), 6, 4, dt);

                    rope.points[0].pinned = true;
                    rope.points[rope.points.length - 1].pinned = true;

                    for (const d of debris) {
                        d.x += d.vx * dt;
                        d.y += d.vy * dt;
                        d.vy += 40 * dt;
                        if (d.y > H + 10) {
                            d.y = -10;
                            d.x = rand(0, W);
                            d.vy = rand(-30, -10);
                        }
                    }
                },

                render() {
                    clear("#11111b");

                    for (let x = 0; x < W; x += 40)
                        drawLine(vec2(x, 0), vec2(x, H), "rgba(49,50,68,0.12)");
                    for (let y = 0; y < H; y += 40)
                        drawLine(vec2(0, y), vec2(W, y), "rgba(49,50,68,0.12)");

                    for (const d of debris)
                        drawRect(
                            vec2(d.x - d.size / 2, d.y - d.size / 2),
                            vec2(d.size, d.size),
                            d.color,
                        );

                    for (const stick of rope.sticks) {
                        drawLine(
                            vec2(stick.a.pos.x, stick.a.pos.y),
                            vec2(stick.b.pos.x, stick.b.pos.y),
                            "#cba6f7",
                            2,
                        );
                    }

                    for (const p of rope.points) {
                        const color = p.pinned
                            ? "#f38ba8"
                            : p === dragPoint
                              ? "#f9e2af"
                              : "#cdd6f4";
                        drawCircle(
                            vec2(p.pos.x, p.pos.y),
                            p.pinned ? 4 : 2.5,
                            color,
                        );
                    }

                    drawCircle(
                        vec2(rope.points[0].pos.x, rope.points[0].pos.y),
                        7,
                        "rgba(243,139,168,0.25)",
                    );
                    drawCircle(
                        vec2(
                            rope.points[rope.points.length - 1].pos.x,
                            rope.points[rope.points.length - 1].pos.y,
                        ),
                        7,
                        "rgba(243,139,168,0.25)",
                    );

                    drawText("VERLET ROPE", vec2(W / 2, 14), {
                        color: "#cba6f7",
                        size: 10,
                        weight: "bold",
                        align: "center",
                    });
                    drawText(
                        "CLICK & DRAG the rope to grab a point",
                        vec2(W / 2, 30),
                        { color: "#a6adc8", size: 7, align: "center" },
                    );
                    drawText(
                        `Points: ${rope.points.length}  Sticks: ${rope.sticks.length}  Red = pinned`,
                        vec2(W / 2, H - 12),
                        {
                            color: "#45475a",
                            size: 7,
                            align: "center",
                            baseline: "bottom",
                        },
                    );
                },
            });
            document
                .getElementById("canvas-container")
                .appendChild(engine.canvasManager.canvas);
            if (engine.overlayCanvas)
                document
                    .getElementById("canvas-container")
                    .appendChild(engine.overlayCanvas);
        </script>
    </body>
</html>
