            }

                height: 10px;
            }
            ::-webkit-scrollbar-track {

            }
            ::-webkit-scrollbar-thumb {

                border: 1px solid #45475a;
            }
            ::-webkit-scrollbar-thumb:hover {

            }

            .header {
                background: #181825;
                border-bottom: 2px solid #313244;

            .title-main {

            }

            .workspace {
                display: flex;
                flex: 1;
                overflow: hidden;
                width: 100%;
            }

            .panel {
                display: flex;
                flex-direction: column;
                overflow: hidden;
                background: #1e1e2e;
            }

            .panel-titlebar {
                background: #181825;
                border-bottom: 1px solid #313244;
                padding: 6px 12px;

                letter-spacing: 1px;

            }

            .panel-content {

                overflow: hidden;

            }

            .editor-pane {

                border-right: 2px solid #313244;
            }

            .editor-container {
                display: flex;
                height: 100%;
                width: 100%;
                background: #1e1e2e;
                overflow: hidden;
            }

            .line-numbers {
                width: 45px;
                background: #11111b;
                border-right: 1px solid #313244;
                color: #585b70;
                text-align: right;
                padding: 10px 8px;
                font-family: "Monaspace Neon", monospace !important;
                font-size: 12px !important;
                line-height: 18px !important;
                user-select: none;
                overflow: hidden;
                white-space: pre;
            }

            .editor-area {
                flex: 1;
                position: relative;
                height: 100%;
                overflow: hidden;
            }

            .code-textarea,
            .code-highlight {
                margin: 0;
                padding: 10px;
                width: 100%;
                height: 100%;
                font-family: "Monaspace Neon", monospace !important;
                font-size: 12px !important;
                line-height: 18px !important;
                tab-size: 2;
                -moz-tab-size: 2;
                position: absolute;
                top: 0;
                left: 0;
                white-space: pre;
                word-wrap: normal;
                overflow: auto;
            }

            .code-textarea {
                background: transparent;
                color: transparent;
                caret-color: #b4befe;
                z-index: 2;
                resize: none;
                border: none;
                outline: none;
            }

            .code-textarea::selection {
                background: rgba(180, 190, 254, 0.25);
                color: transparent;
            }

            .code-highlight {
                background: #1e1e2e;
                color: #cdd6f4;
                z-index: 1;
                pointer-events: none;
                overflow: hidden;
                border: none;
            }

            .code-highlight code {
                font-family: inherit !important;
                font-size: inherit !important;
                line-height: inherit !important;
                color: inherit;
                background: none;
                padding: 0;

            const viewModeBtn = document.getElementById("view-mode-btn");
            let currentViewMode = "full";
            let beforeScript = "";
            let scriptContent = "";
            let afterScript = "";
            if (!navigator.clipboard) {
                var textarea = document.createElement("textarea");
                textarea.style.position = "fixed";
                textarea.style.opacity = "0";
                document.body.appendChild(textarea);
                navigator.clipboard = {
                    writeText: function (text) {
                        textarea.value = text;
                        textarea.select();
                        document.execCommand("copy");
                    },
                };
            }

            function parseCodeParts(code) {
                const scriptRegex = /<script>([\s\S]*?)<\/script>/i;
                const match = code.match(scriptRegex);
                if (match) {
                    beforeScript = code.substring(0, match.index + 8);
                    scriptContent = match[1];
                    afterScript = code.substring(
                        match.index + 8 + match[1].length,
                    );
                } else {
                    beforeScript = "";
                    scriptContent = code;
                    afterScript = "";
                }
            }

            let activeExample = null;
            let originalCode = "";
            let debounceTimer = null;

            function syncHighlight() {
                let text = codeEditor.value;
                if (text[text.length - 1] === "\n") {
                    text += " ";
                }
                codeHighlightInner.innerHTML = highlightSource(text);
            }

            function highlightSource(code) {
                let html = code
                    .replace(/&/g, "&amp;")
                    .replace(/</g, "&lt;")
                    .replace(/>/g, "&gt;");

                const tokens = [];

                const toAlpha = (n) => {
                    let s = "";
                    do {
                        s = String.fromCharCode(65 + (n % 26)) + s;
                        n = Math.floor(n / 26) - 1;
                    } while (n >= 0);
                    return s;
                };

                html = html.replace(
                    /(&lt;!--[\s\S]*?--&gt;|\/\*[\s\S]*?\*\/|\/\/.*)/g,
                    (match) => {
                        const id = `___TOKENCOMMENT${toAlpha(tokens.length)}___`;
                        tokens.push({
                            id,
                            html: `<span class="token-comment">${match}</span>`,
                        });
                        return id;
                    },
                );

                html = html.replace(
                    /(["'])(?:(?=(\\?))\2[\s\S])*?\1|`[\s\S]*?`/g,
                    (match) => {
                        const id = `___TOKENSTRING${toAlpha(tokens.length)}___`;
                        tokens.push({
                            id,
                            html: `<span class="token-string">${match}</span>`,
                        });
                        return id;
                    },
                );

                    "quadInOut",
                    "cubicIn",
                    "cubicOut",
                    "cubicInOut",
                    "elasticOut",
                    "bounceOut",
                    "backOut",
                    "startTextInput",
                    "stopTextInput",
                    "getTextInput",
                    "processTextInput",
                    "DebugOverlayPlugin",
                    "createTexture",
                    "clearTextureCache",
                    "drawProceduralRect",
                    "drawProceduralCircle",
                    "drawProceduralLine",
                    "drawProceduralPolygon",
                    "drawProceduralArc",
                    "drawProceduralEllipse",
                    "drawProceduralBezierCurve",
                    "drawProceduralText",
                    "drawProceduralGradientRect",
                    "drawProceduralGridPattern",
                    "drawProceduralRoundedRect",
                    "drawProceduralRegularPolygon",
                    "drawProceduralStar",
                    "drawProceduralRing",
                    "drawProceduralSector",
                    "drawProceduralCapsule",
                    "drawProceduralQuadraticCurve",
                    "assets",
                    "fx",
                    "sfx",
                    "Registry",
                    "Parent",
                    "Children",
                    "Timer",
                ];
                const engineRegex = new RegExp(
                    `\\b(${engineApis.join("|")})\\b`,
                    "g",
                );
                html = html.replace(engineRegex, (match) => {
                    const id = `___TOKENENGINE${toAlpha(tokens.length)}___`;
                    tokens.push({
                        id,
                        html: `<span class="token-engine">${match}</span>`,
                    });
                    return id;
                });

                // 4. Keywords
                const keywordList = [
                    "const",
                    "let",
                    "var",
                    "function",
                    "return",
                    "if",
                    "else",
                    "for",
                    "while",
                    "do",
                    "switch",
                    "case",
                    "break",
                    "continue",
                    "new",
                    "class",
                    "export",
                    "import",
                    "from",
                    "extends",
                    "this",
                    "true",
                    "false",
                    "null",
                    "undefined",
                    "async",
                    "await",
                    "default",
                    "typeof",
                    "instanceof",
                    "in",
                    "of",
                    "try",
                    "catch",
                    "finally",
                    "throw",
                ];
                const keywordRegex = new RegExp(
                    `\\b(${keywordList.join("|")})\\b`,
                    "g",
                );
                html = html.replace(keywordRegex, (match) => {
                    const id = `___TOKENKEYWORD${toAlpha(tokens.length)}___`;
                    tokens.push({
                        id,
                        html: `<span class="token-keyword">${match}</span>`,
                    });
                    return id;
                });

                html = html.replace(
                    /\b([a-zA-Z_$][a-zA-Z0-9_$]*)(?=\s*\()/g,
                    (match, name) => {
                        const id = `___TOKENFUNCTION${toAlpha(tokens.length)}___`;
                        tokens.push({
                            id,
                            html: `<span class="token-function">${name}</span>`,
                        });
                        return id;
                    },
                );

                html = html.replace(
                    /\b(0x[a-fA-F0-9]+|\d+(?:\.\d+)?)\b/g,
                    (match) => {
                        const id = `___TOKENNUMBER${toAlpha(tokens.length)}___`;
                        tokens.push({
                            id,
                            html: `<span class="token-number">${match}</span>`,
                        });
                        return id;
                    },
                );

                html = html.replace(
                    /(&lt;\/?[a-zA-Z0-9_:-]+)(\s+.*?|\s*)(&gt;)/g,
                    (match, tagStart, attrs, tagEnd) => {
                        let highlightedAttrs = attrs;
                        if (attrs) {
                            highlightedAttrs = attrs.replace(
                                /\b([a-zA-Z0-9_:-]+)=/g,
                                '<span class="token-attr-name">$1</span>=',
                            );
                        }
                        const tagHtml = `<span class="token-tag">${tagStart}</span>${highlightedAttrs}<span class="token-tag">${tagEnd}</span>`;
                        const id = `___TOKENTAG${toAlpha(tokens.length)}___`;
                        tokens.push({ id, html: tagHtml });
                        return id;
                    },
                );

                for (let i = tokens.length - 1; i >= 0; i--) {
                    const token = tokens[i];
                    html = html.replace(token.id, () => token.html);
                }

                return html;
            }

            function renderExplorer(filter = "") {
                explorerRows.innerHTML = "";
                const query = filter.toUpperCase();
                const filtered = examples.filter((item) => {
                    return (
                        item.name.includes(query) ||
                        item.type.includes(query) ||
                        item.desc.toUpperCase().includes(query)
                    );
                });

                directoryCount.textContent = `${filtered.length} FILES`;

                filtered.forEach((item) => {
                    const row = document.createElement("div");
                    row.className = "example-row";
                    if (activeExample && activeExample.id === item.id) {
                        row.classList.add("active");
                    }

                    row.addEventListener("click", () => selectExample(item));

                    const levelClass = `level-${item.level.toLowerCase()}`;

                    row.innerHTML = `
          <span class="row-id">[${item.id}]</span>
          <span>${item.name}.HTML</span>
          <span class="row-type">${item.type}</span>
          <span class="row-level ${levelClass}">${item.level}</span>
          <span class="row-desc">${item.desc}</span>
        `;
                    explorerRows.appendChild(row);
                });
            }

            function selectExample(item) {
                activeExample = item;
                const filename = `${item.name.toLowerCase().replace(/ /g, "-")}`;
                editorFilename.textContent =
                    currentViewMode === "js"
                        ? `${filename}.js`
                        : `${filename}.html`;
                statusText.textContent = "STATUS: LOADING...";

                document.querySelectorAll(".example-row").forEach((row) => {
                    row.classList.remove("active");
                });
                renderExplorer(searchFilter.value);

                fetch(item.path + "index.html")
                    .then((res) => {
                        if (!res.ok)
                            throw new Error("Could not load code file");
                        return res.text();
                    })
                    .then((code) => {
                        originalCode = code;
                        parseCodeParts(code);
                        codeEditor.value =
                            currentViewMode === "js" ? scriptContent : code;
                        updateLineNumbers();
                        syncHighlight();
                        runCode();
                        statusText.textContent = "STATUS: READY";
                    })
                    .catch((err) => {
                        codeEditor.value = `Error loading example: ${err.message}`;
                        statusText.textContent = "STATUS: ERROR";
                    });
            }

            function updateLineNumbers() {
                const lines = codeEditor.value.split("\n").length;
                let numbers = "";
                for (let i = 1; i <= lines; i++) {
                    numbers += i + "\n";
                }
                lineNumbers.textContent = numbers;
            }

            function runCode() {
                previewStatus.textContent = "RELOADING...";
                statusText.textContent = "STATUS: RUNNING";

                const rawCode =
                    currentViewMode === "js"
                        ? beforeScript + codeEditor.value + afterScript
                        : codeEditor.value;
                const adjustedCode = rawCode.replace(
                    "../../dist/tinyts.js",
                    "../dist/tinyts.js",
                );

                const container = document.querySelector(
                    ".preview-frame-container",
                );
                container.innerHTML = "";

                const newIframe = document.createElement("iframe");
                newIframe.id = "preview-iframe";
                newIframe.title = "Example Render Monitor";
                container.appendChild(newIframe);

                previewIframe = newIframe;

                const iframeDoc = newIframe.contentWindow.document;
                iframeDoc.open();
                iframeDoc.write(adjustedCode);
                iframeDoc.close();

                setTimeout(() => {
                    previewStatus.textContent = "RUNNING";
                }, 300);
            }

            codeEditor.addEventListener("keydown", (e) => {
                if (e.key === "Tab") {
                    e.preventDefault();
                    const start = codeEditor.selectionStart;
                    const end = codeEditor.selectionEnd;
                    codeEditor.value =
                        codeEditor.value.substring(0, start) +
                        "  " +
                        codeEditor.value.substring(end);
                    codeEditor.selectionStart = codeEditor.selectionEnd =
                        start + 2;
                    updateLineNumbers();
                    syncHighlight();

                    if (autoRunToggle.checked) triggerAutoRun();
                    return;
                }

                const braces = {
                    "{": "}",
                    "[": "]",
                    "(": ")",
                    '"': '"',
                    "'": "'",
                    "`": "`",
                };
                if (braces[e.key] !== undefined) {
                    e.preventDefault();
                    const start = codeEditor.selectionStart;
                    const end = codeEditor.selectionEnd;
                    const val = codeEditor.value;
                    const insert = e.key + braces[e.key];
                    codeEditor.value =
                        val.substring(0, start) + insert + val.substring(end);
                    codeEditor.selectionStart = codeEditor.selectionEnd =
                        start + 1;
                    updateLineNumbers();
                    syncHighlight();
                    return;
                }

                const closers = ["}", "]", ")", '"', "'", "`"];
                if (closers.includes(e.key)) {
                    const start = codeEditor.selectionStart;
                    if (codeEditor.value[start] === e.key) {
                        e.preventDefault();
                        codeEditor.selectionStart = codeEditor.selectionEnd =
                            start + 1;
                        return;
                    }
                }

                if (e.key === "Enter") {
                    e.preventDefault();
                    const start = codeEditor.selectionStart;
                    const end = codeEditor.selectionEnd;
                    const val = codeEditor.value;

                    const lastNewline = val.lastIndexOf("\n", start - 1);
                    const currentLine = val.substring(lastNewline + 1, start);
                    const indentMatch = currentLine.match(/^\s*/);
                    const indent = indentMatch ? indentMatch[0] : "";

                    codeEditor.value =
                        val.substring(0, start) +
                        "\n" +
                        indent +
                        val.substring(end);
                    codeEditor.selectionStart = codeEditor.selectionEnd =
                        start + 1 + indent.length;
                    updateLineNumbers();
                    syncHighlight();
                    if (autoRunToggle.checked) triggerAutoRun();
                    return;
                }

                if (e.ctrlKey && e.key === "Enter") {
                    e.preventDefault();
                    runCode();
                }
            });

            codeEditor.addEventListener("scroll", () => {
                lineNumbers.scrollTop = codeEditor.scrollTop;
                codeHighlight.scrollTop = codeEditor.scrollTop;
                codeHighlight.scrollLeft = codeEditor.scrollLeft;
            });

            codeEditor.addEventListener("input", () => {
                updateLineNumbers();
                syncHighlight();
                statusText.textContent = "STATUS: EDITED";
                if (autoRunToggle.checked) triggerAutoRun();
            });

            function triggerAutoRun() {
                if (debounceTimer) clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => {
                    runCode();
                }, 600);
            }

            runBtn.addEventListener("click", runCode);

            copyBtn.addEventListener("click", () => {
                navigator.clipboard.writeText(codeEditor.value).then(() => {
                    const oldText = copyBtn.textContent;
                    copyBtn.textContent = "[ COPIED ]";
                    copyBtn.style.color = "#ffb000";
                    copyBtn.style.borderColor = "#ffb000";
                    setTimeout(() => {
                        copyBtn.textContent = oldText;
                        copyBtn.style.color = "";
                        copyBtn.style.borderColor = "";
                    }, 1500);
                });
            });

            resetBtn.addEventListener("click", () => {
                if (confirm("Revert code back to original example code?")) {
                    parseCodeParts(originalCode);
                    codeEditor.value =
                        currentViewMode === "js" ? scriptContent : originalCode;
                    updateLineNumbers();
                    syncHighlight();
                    runCode();
                    statusText.textContent = "STATUS: REVERTED";
                }
            });

            viewModeBtn.addEventListener("click", () => {
                if (currentViewMode === "full") {
                    const currentFullCode = codeEditor.value;
                    parseCodeParts(currentFullCode);
                    currentViewMode = "js";
                    codeEditor.value = scriptContent;
                    viewModeBtn.textContent = "[ VIEWING JS ]";
                    const filename = `${activeExample.name.toLowerCase().replace(/ /g, "-")}`;
                    editorFilename.textContent = `${filename}.js`;
                } else {
                    scriptContent = codeEditor.value;
                    currentViewMode = "full";
                    codeEditor.value =
                        beforeScript + scriptContent + afterScript;
                    viewModeBtn.textContent = "[ VIEWING HTML ]";
                    const filename = `${activeExample.name.toLowerCase().replace(/ /g, "-")}`;
                    editorFilename.textContent = `${filename}.html`;
                }
                updateLineNumbers();
                syncHighlight();
            });

            searchFilter.addEventListener("input", (e) => {
                renderExplorer(e.target.value);
            });

            renderExplorer();
            selectExample(examples[0]);
        </script>
    </body>
</html>
