<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta
            name="description"
            content="Side-scrolling tilemap platformer game."
        />
        <title>TinyTS - Platformer</title>
        <style>
            @font-face {
                font-family: "Monaspace Neon";
                src: url("https://cdn.ujjwalvivek.com/fonts/Monaspace/Neon/Var.woff2")
                    format("woff2");
                font-weight: 100 900;
                font-style: normal;
                font-display: block;
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                background: #1e1e2e;
                color: #cdd6f4;
                font-family: "Monaspace Neon", monospace;
                overflow: hidden;
                display: flex;
                align-items: center;
                justify-content: center;
                width: 100vw;
                height: 100vh;
            }
            #canvas-container {
                width: 100%;
                height: 100%;
                position: relative;
                background: #11111b;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            #canvas-container canvas {
                position: absolute !important;
                left: 50% !important;
                top: 50% !important;
                transform: translate(-50%, -50%) !important;
                max-width: 95% !important;
                max-height: 95% !important;
                width: auto !important;
                height: auto !important;
                aspect-ratio: 16/9 !important;
                border: 2px dashed #cba6f7;
            }
        </style>
    </head>
    <body>
        <div id="canvas-container"></div>
        <script src="../../dist/tinyts.js"></script>
        <script>
            const W = 640,
                H = 360;
            const TILE_SIZE = 16;

            const wallTex = assets.makeWallTexture();
            const coinTex = assets.makeCoinTexture();
            const spikeTex = assets.makeSpikeTexture();
            const checkpointTex = assets.makeCheckpointTexture();
            const groundTex = assets.makeGroundTexture();

            const legend = {
                ".": { solid: false },
                "#": { solid: true, color: "#313244", texture: wallTex },
                "=": { solid: true, color: "#45475a", texture: groundTex },
                "-": { solid: true, oneWay: true, color: "#cba6f7" },
                C: { spawn: "coin" },
                P: { spawn: "player" },
                X: { spawn: "spike" },
                E: { spawn: "checkpoint" },
            };

            // Map Layout (120 columns wide, 20 columns high)
            const mapStr = `
########################################################################################################################
#                                                                                                                      #
#                                                                                                                      #
#                                                                                                                      #
#                                                                                                                      #
#                                                                                                                      #
#             - - -                                  C  C                                                              #
#                                                   ======                                                             #
#       - -                                                    C                                                       #
#                                                    - - -    ====                                                     #
#                                    - -                                                                               #
#                                                                                                                      #
#               C  C                                          C    C                                                   #
#             =======                                      =======                                                     #
#                                           C                                                                          #
#                                        =======                                     C    C    C                       #
#    P                   C    C                                                     ===========                        #
#   ====               =========                X    X          - - - -                                       E        #
#          XX    XX                     ===================              X    X                           =========    #
#   ===================================                     ============================================================
########################################################################################################################
`;

            const map = tilemapFromString(mapStr, legend, TILE_SIZE);

            const spawnCenter = map.getSpawn("player") || vec2(32, 200);
            const startPos = spawnCenter.subtract(vec2(5, 7));

            const player = {
                pos: startPos.clone(),
                size: vec2(10, 14),
                vel: vec2(0, 0),
                speed: 130,
                gravity: 580,
                jumpImpulse: -230,
                grounded: false,
                doubleJumped: false,
                jumpReleased: true,
                flipX: false,
                score: 0,
                dead: false,
                animTime: 0,
            };

            const coins = [];
            const spikes = [];
            let exitPos = null;

            let coinIdx = 0;
            while (true) {
                const cCenter = map.getSpawn("coin", coinIdx++);
                if (!cCenter) break;
                coins.push({
                    pos: cCenter.subtract(vec2(8, 8)),
                    active: true,
                    offset: rand(0, Math.PI * 2),
                });
            }

            let spikeIdx = 0;
            while (true) {
                const sCenter = map.getSpawn("spike", spikeIdx++);
                if (!sCenter) break;
                spikes.push({ pos: sCenter.subtract(vec2(8, 8)) });
            }

            const exitCenter = map.getSpawn("checkpoint");
            if (exitCenter) {
                exitPos = exitCenter.subtract(vec2(8, 8));
            }

            const camera = createCamera({
                size: vec2(W, H),
                bounds: {
                    pos: vec2(0, 0),
                    size: vec2(map.width * TILE_SIZE, map.height * TILE_SIZE),
                },
            });

            camera.follow(player.pos, {
                deadZone: vec2(60, 40),
                speed: 5,
            });

            bindAction("left", ["KeyA", "ArrowLeft"]);
            bindAction("right", ["KeyD", "ArrowRight"]);
            bindAction("jump", ["Space", "KeyW", "ArrowUp"]);

            function die() {
                if (player.dead) return;
                player.dead = true;
                playSound(sfx.death());
                camera.shake(8);

                emitParticles({
                    pos: player.pos
                        .clone()
                        .add(vec2(player.size.x / 2, player.size.y / 2)),
                    count: 25,
                    life: [0.3, 0.8],
                    speed: [40, 140],
                    size: [2, 5],
                    color: ["#f38ba8", "#fab387", "#313244"],
                });

                setTimeout(() => {
                    player.pos.copy(startPos);
                    player.vel.set(0, 0);
                    player.dead = false;
                    player.doubleJumped = false;
                    player.jumpReleased = true;
                    playSound(sfx.teleport({ pitch: 0.7 }));
                }, 1000);
            }

            const engine = engineStart({
                size: { width: W, height: H },
                pixelated: true,

                update(dt) {
                    updateParticles(dt);
                    if (player.dead) return;

                    let moveDir = 0;
                    if (actionDown("left")) {
                        moveDir = -1;
                        player.flipX = true;
                    }
                    if (actionDown("right")) {
                        moveDir = 1;
                        player.flipX = false;
                    }

                    player.vel.x = moveDir * player.speed;
                    player.vel.y += player.gravity * dt;

                    const jumpDown = actionDown("jump");
                    if (!jumpDown) {
                        player.jumpReleased = true;
                    }

                    if (actionPressed("jump") && player.jumpReleased) {
                        if (player.grounded) {
                            player.vel.y = player.jumpImpulse;
                            player.grounded = false;
                            player.jumpReleased = false;
                            playSound(sfx.jump({ volume: 0.2 }));

                            emitParticles({
                                pos: vec2(
                                    player.pos.x + player.size.x / 2,
                                    player.pos.y + player.size.y,
                                ),
                                count: 5,
                                life: [0.1, 0.25],
                                speed: [10, 30],
                                angle: [Math.PI * 0.8, Math.PI * 1.2],
                                size: [1, 3],
                                color: ["rgba(205, 214, 244, 0.3)"],
                            });
                        } else if (!player.doubleJumped) {
                            player.vel.y = player.jumpImpulse * 0.9;
                            player.doubleJumped = true;
                            player.jumpReleased = false;
                            playSound(sfx.jump({ volume: 0.15, pitch: 1.3 }));

                            emitParticles({
                                pos: player.pos
                                    .clone()
                                    .add(
                                        vec2(
                                            player.size.x / 2,
                                            player.size.y / 2,
                                        ),
                                    ),
                                count: 8,
                                life: [0.2, 0.4],
                                speed: [30, 80],
                                size: [2, 4],
                                color: ["#cba6f7", "#89b4fa"],
                            });
                        }
                    }

                    const prevGrounded = player.grounded;
                    const moveRes = moveTilemap(player, player.vel, map, dt);
                    player.pos.copy(moveRes.pos);
                    player.vel.copy(moveRes.velocity);
                    player.grounded = moveRes.touching.bottom;

                    if (player.grounded) {
                        player.doubleJumped = false;
                        if (!prevGrounded && player.vel.y > 0) {
                            playSound(sfx.land({ volume: 0.1 }));
                            emitParticles({
                                pos: vec2(
                                    player.pos.x + player.size.x / 2,
                                    player.pos.y + player.size.y,
                                ),
                                count: 4,
                                life: [0.1, 0.2],
                                speed: [10, 20],
                                size: [1, 2],
                                color: ["rgba(205, 214, 244, 0.2)"],
                            });
                        }
                    }

                    if (moveDir !== 0 && player.grounded) {
                        player.animTime += dt * 12;
                    } else if (!player.grounded) {
                        player.animTime = 1;
                    } else {
                        player.animTime = 0;
                    }

                    const pBox = { pos: player.pos, size: player.size };
                    for (const c of coins) {
                        if (
                            c.active &&
                            aabbOverlap(pBox, {
                                pos: c.pos,
                                size: vec2(16, 16),
                            })
                        ) {
                            c.active = false;
                            player.score++;
                            playSound(sfx.coin({ volume: 0.2 }));

                            emitParticles({
                                pos: c.pos.clone().add(vec2(8, 8)),
                                count: 8,
                                life: [0.2, 0.5],
                                speed: [20, 60],
                                size: [1, 3],
                                color: ["#f9e2af", "#fab387", "#fff"],
                            });
                        }
                    }

                    for (const s of spikes) {
                        if (
                            aabbOverlap(pBox, {
                                pos: s.pos,
                                size: vec2(16, 16),
                            })
                        ) {
                            die();
                        }
                    }

                    if (
                        exitPos &&
                        aabbOverlap(pBox, { pos: exitPos, size: vec2(16, 16) })
                    ) {
                        playSound(sfx.powerup());
                        coins.forEach((c) => (c.active = true));
                        player.pos.copy(startPos);
                        player.vel.set(0, 0);
                        camera.shake(4);
                    }

                    if (player.pos.y > map.height * TILE_SIZE + 32) {
                        die();
                    }

                    camera.update(dt);
                },

                render() {
                    clear("#11111b");

                    camera.apply();

                    const gridSp = 16;
                    for (let x = 0; x < map.width * TILE_SIZE; x += gridSp) {
                        drawLine(
                            vec2(x, 0),
                            vec2(x, map.height * TILE_SIZE),
                            "rgba(49, 50, 68, 0.08)",
                        );
                    }
                    for (let y = 0; y < map.height * TILE_SIZE; y += gridSp) {
                        drawLine(
                            vec2(0, y),
                            vec2(map.width * TILE_SIZE, y),
                            "rgba(49, 50, 68, 0.08)",
                        );
                    }

                    for (let y = 0; y < map.height; y++) {
                        for (let x = 0; x < map.width; x++) {
                            const def = map.getTileDef(x, y);
                            if (def) {
                                const px = x * TILE_SIZE;
                                const py = y * TILE_SIZE;
                                if (def.texture) {
                                    drawSprite(
                                        def.texture,
                                        vec2(px, py),
                                        vec2(TILE_SIZE, TILE_SIZE),
                                    );
                                } else if (def.oneWay) {
                                    drawRect(
                                        vec2(px, py),
                                        vec2(TILE_SIZE, 4),
                                        def.color,
                                    );
                                    drawRect(
                                        vec2(px, py + 4),
                                        vec2(TILE_SIZE, 1),
                                        "rgba(255,255,255,0.06)",
                                    );
                                } else if (def.color) {
                                    drawRect(
                                        vec2(px, py),
                                        vec2(TILE_SIZE, TILE_SIZE),
                                        def.color,
                                    );
                                }
                            }
                        }
                    }

                    if (exitPos) {
                        drawSprite(checkpointTex, exitPos, vec2(16, 16));
                    }

                    for (const s of spikes) {
                        drawSprite(spikeTex, s.pos, vec2(16, 16));
                    }

                    for (const c of coins) {
                        if (c.active) {
                            const bob = Math.sin(time * 4 + c.offset) * 2;
                            drawSprite(
                                coinTex,
                                c.pos.clone().add(vec2(0, bob)),
                                vec2(16, 16),
                            );
                        }
                    }

                    if (!player.dead) {
                        const color = player.doubleJumped
                            ? "#cba6f7"
                            : "#89b4fa";
                        drawRect(player.pos, player.size, color);
                        const visorX = player.flipX
                            ? player.pos.x + 1
                            : player.pos.x + player.size.x - 5;
                        drawRect(
                            vec2(visorX, player.pos.y + 3),
                            vec2(4, 3),
                            "#fff",
                        );
                    }

                    renderParticles();

                    camera.end();

                    drawRect(vec2(0, 0), vec2(W, 30), "rgba(24, 24, 37, 0.85)");
                    drawLine(vec2(0, 30), vec2(W, 30), "#313244", 1);

                    drawText(`COINS: ${player.score}`, vec2(16, 10), {
                        font: "bold 10px 'Monaspace Neon'",
                        color: "#f9e2af",
                    });
                    drawText(
                        "A/D OR LEFT/RIGHT TO WALK   SPACE TO JUMP",
                        vec2(W / 2, 10),
                        {
                            font: "9px 'Monaspace Neon'",
                            color: "#a6adc8",
                            align: "center",
                        },
                    );

                    if (exitPos) {
                        const dist = Math.floor(player.pos.distanceTo(exitPos));
                        drawText(`EXIT: ${dist}M`, vec2(W - 16, 10), {
                            font: "bold 10px 'Monaspace Neon'",
                            color: "#a6e3a1",
                            align: "right",
                        });
                    }
                },
            });

            document
                .getElementById("canvas-container")
                .appendChild(engine.canvasManager.canvas);
            if (engine.overlayCanvas) {
                document
                    .getElementById("canvas-container")
                    .appendChild(engine.overlayCanvas);
            }
        </script>
    </body>
</html>
