<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>TinyTS - Procedural World Generator</title>
        <style>
            @font-face {
                font-family: "TinyTS";
                src: url("../../dist/font/tinyTS.woff2")
                    format("woff2");
                font-weight: 100 900;
                font-style: normal;
                font-display: block;
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            body {
                background: #1e1e2e;
                color: #cdd6f4;
                font-family: "TinyTS", monospace;
                min-height: 100vh;
                display: flex;
                overflow: hidden;
            }
            #game-container {
                display: flex;
                width: 100vw;
                height: 100vh;
                flex-direction: row;
            }
            #canvas-container {
                flex: 1;
                height: 100%;
                position: relative;
                background: #11111b;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            #canvas-container canvas {
                position: absolute !important;
                left: 50% !important;
                top: 50% !important;
                transform: translate(-50%, -50%) !important;
                max-width: 100% !important;
                max-height: 100% !important;
                width: auto !important;
                height: auto !important;
                aspect-ratio: 3/2 !important;
                border: 2px dashed #cba6f7;
            }
            #control-panel {
                width: 320px;
                height: 100%;
                background: #181825;
                border-left: 1px solid #313244;
                padding: 20px;
                display: flex;
                flex-direction: column;
                overflow-y: auto;
                z-index: 10;
            }
            .section-label {
                font-size: 7px;
                text-transform: uppercase;
                letter-spacing: 1.5px;
                color: #b4befe;
                margin: 12px 0 8px;
                border-top: 1px solid #313244;
                padding-top: 10px;
            }
            .section-label:first-of-type {
                margin-top: 0;
                border-top: none;
                padding-top: 0;
            }
            .control-row {
                margin-bottom: 8px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                font-size: 8.4px;
                color: #cdd6f4;
            }
            .btn {
                background: #313244;
                border: 1px solid #45475a;
                color: #cdd6f4;
                padding: 8px 18px;
                cursor: pointer;
                border-radius: 0 !important;
                font-family: "TinyTS", monospace;
                font-size: 9.1px;
                transition: all 0.15s;
                width: 100%;
            }
            .btn:hover {
                background: #45475a;
                border-color: #89b4fa;
            }
            #seed-display {
                color: #f9e2af;
            }
            .info-box {
                font-size: 7.7px;
                color: #a6adc8;
                margin-top: 10px;
                line-height: 1.6;
            }
            html {
                -webkit-text-size-adjust: 100%;
                text-size-adjust: 100%;
            }
        </style>
    </head>
    <body>
        <div id="game-container">
            <div id="canvas-container"></div>
            <div id="control-panel">
                <div class="section-label">Generator</div>
                <div class="control-row">
                    <button class="btn" onclick="generateWorld()">
                        🔄 Regenerate
                    </button>
                </div>
                <div class="control-row">
                    <span>Seed: <span id="seed-display">0</span></span>
                </div>
                <div class="section-label">Controls</div>
                <div class="info-box">
                    WASD / Arrows to move<br />
                    R to regenerate<br />
                    F1 debug overlay
                </div>
            </div>
        </div>

        <script src="../../dist/tinyts.js"></script>
        <script>
            const W = 960;
            const H = 640;
            const TILE = 16;
            const COLS = W / TILE;
            const ROWS = H / TILE;

            const TILES = [
                /* 0 - air */ {},
                /* 1 - water */ { color: "#89b4fa" }, // Blue
                /* 2 - sand */ { color: "#f9e2af" }, // Yellow
                /* 3 - grass */ { solid: true, color: "#a6e3a1" }, // Green
                /* 4 - stone */ { solid: true, color: "#585b70" }, // Surface2
                /* 5 - snow */ { solid: true, color: "#cdd6f4" }, // Text
                /* 6 - trunk */ { solid: true, color: "#fab387" }, // Peach
                /* 7 - leaves */ { color: "#94e2d5" }, // Teal
                /* 8 - cave */ { solid: true, color: "#313244" }, // Surface0
                /* 9 - platform */ {
                    solid: true,
                    oneWay: true,
                    color: "#f5c2e7",
                    restitution: 0.1,
                },
            ];

            let world;
            let seed = 0;
            let texPlayer;
            let texCoin;

            const player = {
                x: 0,
                y: 0,
                r: 7,
                vx: 0,
                vy: 0,
                spawnX: 0,
                spawnY: 0,
            };

            function generateWorld() {
                seed = (Math.random() * 100000) | 0;
                document.getElementById("seed-display").textContent = seed;

                const OFF = seed * 1000;

                world = createTilemap(COLS, ROWS, TILE, TILES, 0);

                for (let y = 0; y < ROWS; y++) {
                    for (let x = 0; x < COLS; x++) {
                        const elev = fractalNoise2D(
                            (x + OFF) / 20,
                            (y + OFF) / 20,
                            4,
                            2,
                            0.5,
                        );

                        let sprite;
                        if (elev < 0.25) sprite = 1;
                        else if (elev < 0.33) sprite = 2;
                        else if (elev < 0.55) sprite = 3;
                        else if (elev < 0.75) sprite = 4;
                        else sprite = 5;

                        world.tiles[y][x] = sprite;
                    }
                }

                const caveX = (20 + ((seed * 7) % 20)) | 0;
                const caveY = (25 + ((seed * 13) % 10)) | 0;
                drawCircleTiles(world, caveX, caveY, 5, 0); // air
                drawCircleTiles(world, caveX + 2, caveY - 3, 3, 0);
                drawCircleTiles(world, caveX, caveY, 6, 8);

                for (let i = 0; i < 100; i++) {
                    const tx = ((seed * (i * 17 + 3) * 7) % COLS) | 0;
                    const ty = ((seed * (i * 13 + 7) * 11) % ROWS) | 0;
                    if (world.tiles[ty][tx] !== 3) continue; // only on grass

                    if (ty > 1) {
                        world.tiles[ty][tx] = 6;
                        world.tiles[ty - 1][tx] = 6;
                        for (let dy = -2; dy <= 0; dy++) {
                            for (let dx = -2; dx <= 2; dx++) {
                                const lx = tx + dx,
                                    ly = ty - 1 + dy;
                                if (
                                    lx >= 0 &&
                                    lx < COLS &&
                                    ly >= 0 &&
                                    ly < ROWS
                                ) {
                                    if (
                                        world.tiles[ly][lx] === 0 ||
                                        world.tiles[ly][lx] === 3
                                    ) {
                                        world.tiles[ly][lx] = 7;
                                    }
                                }
                            }
                        }
                    }
                }

                fillTiles(world, 25, 22, 10, 1, 9);

                let bestY = 0,
                    bestX = (COLS / 2) | 0;
                for (let x = 20; x < 40; x++) {
                    for (let y = 0; y < ROWS; y++) {
                        if (world.tiles[y][x] === 3 && y > bestY) {
                            bestY = y;
                            bestX = x;
                        }
                    }
                }
                player.spawnX = bestX * TILE + TILE / 2;
                player.spawnY = bestY * TILE + TILE / 2;
                player.x = player.spawnX;
                player.y = player.spawnY;
                player.vx = 0;
                player.vy = 0;

                coins.length = 0;
                for (let i = 0; i < 12; i++) {
                    const cx = (((seed * (i * 23 + 11)) % (COLS - 4)) + 2) | 0;
                    const cy = (((seed * (i * 19 + 5)) % (ROWS - 4)) + 2) | 0;
                    if (world.tiles[cy][cx] !== 1) {
                        coins.push({
                            x: cx * TILE + 2,
                            y: cy * TILE + 2,
                            collected: false,
                        });
                    }
                }
            }

            const coins = [];

            const SPEED = 150;

            function updatePlayer(dt) {
                let moveX = 0;
                let moveY = 0;
                if (keyDown("ArrowLeft") || keyDown("KeyA")) moveX = -1;
                if (keyDown("ArrowRight") || keyDown("KeyD")) moveX = 1;
                if (keyDown("ArrowUp") || keyDown("KeyW")) moveY = -1;
                if (keyDown("ArrowDown") || keyDown("KeyS")) moveY = 1;

                const len = Math.hypot(moveX, moveY) || 1;
                player.vx = (moveX / len) * SPEED;
                player.vy = (moveY / len) * SPEED;

                const nextX = clamp(
                    player.x + player.vx * dt,
                    player.r,
                    W - player.r,
                );
                const nextY = clamp(
                    player.y + player.vy * dt,
                    player.r,
                    H - player.r,
                );
                const tileX = clamp((nextX / TILE) | 0, 0, COLS - 1);
                const tileY = clamp((nextY / TILE) | 0, 0, ROWS - 1);
                if (world.tiles[tileY][tileX] !== 1) {
                    player.x = nextX;
                    player.y = nextY;
                }

                for (const coin of coins) {
                    if (coin.collected) continue;
                    const dx = player.x - (coin.x + 6);
                    const dy = player.y - (coin.y + 6);
                    if (dx * dx + dy * dy < 12 * 12) coin.collected = true;
                }
            }

            function renderWorld() {
                clear("#11111b");

                world.render();

                for (const coin of coins) {
                    if (!coin.collected) {
                        drawSprite(texCoin, vec2(coin.x, coin.y), vec2(12, 12));
                    }
                }

                drawCircle(vec2(player.x, player.y), player.r + 3, "#11111b");
                drawCircle(vec2(player.x, player.y), player.r + 1, "#f9e2af");
                drawCircle(vec2(player.x, player.y), player.r - 2, "#89b4fa");
                drawRect(vec2(player.x - 2, player.y - 2), vec2(4, 4), "#11111b");

                const collected = coins.filter((c) => c.collected).length;
                drawText(
                    `${collected}/${coins.length} coins`,
                    vec2(8, 8),
                    { color: "#cdd6f4", size: 8.4 },
                );
            }

            const engine = engineStart({
                size: { width: W, height: H },
                update(dt) {
                    if (!world) return;
                    if (actionPressed("regenerate")) generateWorld();
                    updatePlayer(dt);
                },
                render(_alpha) {
                    if (!world) {
                        clear("#11111b");
                        drawText(
                            "Generating world…",
                            vec2(W / 2 - 60, H / 2),
                            "#a6adc8",
                            14,
                        );
                        return;
                    }
                    renderWorld();
                },
            });

            document
                .getElementById("canvas-container")
                .appendChild(engine.canvasManager.canvas);
            if (engine.overlayCanvas) {
                document
                    .getElementById("canvas-container")
                    .appendChild(engine.overlayCanvas);
            }

            texCoin = assets.makeCoinTexture();
            generateWorld();

            bindAction("regenerate", "KeyR");
            addTouchControls({
                left: "ArrowLeft",
                right: "ArrowRight",
                up: "ArrowUp",
                down: "ArrowDown",
                buttons: [{ id: "regenerate", label: "REGEN", keys: "KeyR" }],
            });
        </script>
    </body>
</html>
