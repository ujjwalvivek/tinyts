<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Untitled Game</title>
        <style>
            :root {
                --color-bg: #09090e;
                --font-main: "TinyTS", "Courier New", Courier, monospace;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            html,
            body {
                width: 100%;
                height: 100%;
                overflow: hidden;
            }

            body {
                background-color: var(--color-bg);
                color: #f3f4f6;
                font-family: var(--font-main);
                display: flex;
                align-items: center;
                justify-content: center;
            }

            #game-container {
                width: 100%;
                height: 100%;
                position: relative;
                overflow: hidden;
            }

            #app {
                width: 100%;
                height: 100%;
                position: relative;
                background: #05070a;
                overflow: hidden;
            }
        </style>
    </head>
    <body>
        <div id="game-container">
            <div id="app"></div>
        </div>
        <script type="module" src="./src/main.ts"></script>
    </body>
</html>
