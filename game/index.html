<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Untitled Game</title>
        <style>
            :root {
                --color-bg: #09090e;
                --font-main: "TinyTS", "Courier New", Courier, monospace;
            }

            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            body {
                background-color: var(--color-bg);
                color: #f3f4f6;
                font-family: var(--font-main);
                overflow: hidden;
                width: 100vw;
                height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            #game-container {
                width: 100vw;
                height: 100vh;
                position: relative;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            #app {
              width: 100vw;
              height: 100vh;
              display: flex;
              align-items: center;
              justify-content: center;
              background: #05070a;
              overflow: hidden;
            }
            
            #app canvas {
              position: static;
              width: min(100vw, calc(100vh * 16 / 9));
              height: min(100vh, calc(100vw * 9 / 16));
              display: block;
            }
        </style>
    </head>
    <body>
        <div id="game-container">
            <div id="app"></div>
        </div>
        <script type="module" src="./src/main.ts"></script>
    </body>
</html>
